<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白の境界線シミュレータ</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="wrap" x-data="whiteApp()" x-init="init()">
  <div class="eyebrow">White Boundary Simulator</div>
  <h1>白は、どこまで白か。</h1>
  <p class="lede">
    どこまで白として数えられるかシミュレーションしてみましょう！
  </p>

  <p class="note">
    真っ白 (255,255,255) からのユークリッド距離
    <code>√((255-R)² + (255-G)² + (255-B)²)</code> が指定した距離以内に入る
    RGB色の数を数えています。全16,777,216色のうち白コーナー付近のみを対象に、
    計算しています。
  </p>

  <div class="hero">
    <div class="slider-block">
      <div class="slider-label">
        <span>白からの距離</span>
        <span x-text="dist.toFixed(2)">0.00</span>
      </div>
      <input type="range" min="0" :max="maxDist" step="0.05"
             x-model.number="dist" @input="update()"
             :style="`--fill:${dist/maxDist*100}%`">
    </div>

    <div class="hero-top">
      <div class="hero-grid-block">
        <div class="section-title">Swatches</div>
        <div class="grid hero-grid">
          <template x-for="(cell, i) in displayCells" :key="i">
            <div class="cell" :class="{ 'cell-empty': !cell }"
                 :style="cell ? `background: rgb(${cell.r},${cell.g},${cell.b})` : ''"
                 :title="cell ? `rgb(${cell.r},${cell.g},${cell.b}) 距離${cell.d.toFixed(2)}` : ''"></div>
          </template>
        </div>
      </div>

      <div class="counter-block">
        <div class="section-title">Description</div>
        <p class="swatch-caption">
          左上が純白 <code>(255,255,255)</code>、右下に向かうほど白から遠い色です。
          <b x-text="renderNote"></b>
        </p>
        <div class="more-note" x-text="moreNote"></div>

        <div class="section-title">Count</div>
        <canvas class="counter-chart" x-ref="chart"></canvas>
        <div class="counter-row">
          <div class="counter" x-text="count.toLocaleString('ja-JP')">1</div>
          <div class="counter-unit">色</div>
        </div>
        <div class="counter-sub" x-text="`全体の ${percentText}%`">全体の 0.0000060%</div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>

<!-- Alpine.js v3 (npm経由でビルドしたcdn.min.jsをそのままローカル配置。外部CDN不要で動作) -->
<script src="alpine.min.js"></script>

</body>
</html>
